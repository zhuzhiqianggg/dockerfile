# =============================================================================
# Server 配置示例
# 位置: /data/openresty/nginx/conf/conf.d/example.conf
# =============================================================================

upstream api_backend {
    least_conn;
    server 192.168.1.100:8080 weight=3 max_fails=2 fail_timeout=30s;
    server 192.168.1.101:8080 weight=2 max_fails=2 fail_timeout=30s;
    server 192.168.1.102:8080 weight=1 max_fails=2 fail_timeout=30s backup;

    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

server {
    listen 80;
    server_name api.example.com;

    charset utf-8;
    access_log /data/openresty/nginx/logs/api.example.com.access.log main;
    error_log /data/openresty/nginx/logs/api.example.com.error.log warn;

    # ---- API 代理 ----
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn perip 10;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # ---- 静态文件 ----
    location /static/ {
        alias /data/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ---- WebSocket 代理 ----
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
