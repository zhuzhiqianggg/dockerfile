user nginx;
worker_processes auto;

error_log /data/openresty/nginx/logs/error.log warn;
pid /data/openresty/nginx/logs/nginx.pid;

worker_rlimit_nofile 65535;

events {
    use epoll;
    worker_connections 8192;
    multi_accept on;
}

http {
    include /data/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    # ---- Lua 路径 ----
    lua_package_path "/data/lua/modules/share/lua/5.1/?.lua;;";
    lua_package_cpath "/data/lua/modules/lib/lua/5.1/?.so;;";

    # ---- 日志 ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time ua="$upstream_addr" '
                    'us="$upstream_status" urt="$upstream_response_time"';

    access_log /data/openresty/nginx/logs/access.log main buffer=32k flush=1m;

    # ---- 性能优化 ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    keepalive_timeout 65;
    keepalive_requests 1000;
    client_header_timeout 60;
    client_body_timeout 60;
    send_timeout 60;
    reset_timedout_connection on;

    client_header_buffer_size 4k;
    large_client_header_buffers 4 32k;
    client_max_body_size 100m;
    client_body_buffer_size 256k;

    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;
    server_names_hash_max_size 512;

    # ---- 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/csv
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/xhtml+xml
        image/svg+xml
        image/x-icon
        font/opentype;

    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1000;
    brotli_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript
        application/xml+rss font/opentype
        image/svg+xml;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ---- 静态缓存 ----
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   max;
        application/javascript     max;
        ~image/                    1M;
        ~font/                     1M;
    }
    expires $expires;

    # ---- 限制 ----
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ---- 真实 IP ----
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ---- WebSocket ----
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ---- 默认 Server ----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        root /data/openresty/nginx/html;
        index index.html index.htm;

        location /healthcheck {
            access_log off;
            return 200 'OK\n';
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ /\. {
            deny all;
        }

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }

    include /data/openresty/nginx/conf/conf.d/*.conf;
}
